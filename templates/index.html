<!DOCTYPE html>
<html>
<head>
    <title>Flask Sample UI</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f2f2f2;
            text-align: center;
            padding-top: 50px;
        }

        .card {
            background: white;
            width: 400px;
            margin: auto;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 10px gray;
        }

        h1 {
            color: #0066cc;
        }

        input {
            width: 80%;
            padding: 10px;
            margin: 10px;
        }

        button {
            background: #0066cc;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #004999;
        }
    </style>

</head>

<body>

<div class="card">

    <h1>Flask Kubernetes Demo</h1>

    <p>Enter your name:</p>

    <form action="/submit" method="POST">

        <input 
            type="text" 
            name="name" 
            placeholder="Your name"
            required
        >

        <br>

        <button type="submit">
            Submit
        </button>

    </form>

</div>

</body>
</html>
